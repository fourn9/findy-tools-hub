<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <!--
      GitHub Pages SPA ルーティング用スクリプト
      参考: https://github.com/rafgraph/spa-github-pages

      仕組み:
        GitHub Pages でディープリンク（例: /catalog/github-actions）に直接アクセスすると
        404 が返る。この 404.html がその URL をセッションストレージに保存し、
        ルートへリダイレクトする。index.html の JS がそれを読み取り、
        正しいパスへ React Router でナビゲートする。
    -->
    <script>
      // セグメント数: GitHub Pages の場合はリポジトリ名が入るため 1 を指定
      // ユーザーページ（<username>.github.io）の場合は 0
      var pathSegmentsToKeep = 1;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
