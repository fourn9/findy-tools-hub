services:
  - type: web
    name: findy-tools-hub-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free           # 無料プラン（15分無操作でスリープ）
    autoDeploy: true     # main ブランチ push で自動デプロイ
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 3000
      - key: ALLOWED_ORIGINS
        value: ""        # 追加オリジンが必要な場合はここに記入
